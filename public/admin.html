    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }

        /* Loading screen */
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to br, #0f172a, #1e293b, #0d9488); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loading-spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #0D9488; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; margin-top: 20px; font-weight: 500; }

        /* Sidebar styles */
        .sidebar-collapsed .sidebar-text { display: none; }
        .sidebar-collapsed .sidebar-icon { width: 100%; text-align: center; }
        .nav-item.active { background: rgba(13, 148, 136, 0.1); border-left: 3px solid #0D9488; }
        .nav-item:hover { background: rgba(13, 148, 136, 0.05); }

        /* Card animations */
        .kpi-card { transition: all 0.3s ease; }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .chart-bar { transition: height 0.3s ease; }
        .chart-bar:hover { opacity: 0.8; }

        /* Trend indicators */
        .trend-up { color: #10B981; }
        .trend-down { color: #EF4444; }
        .trend-neutral { color: #6B7280; }

        /* Utilization bars */
        .utilization-bar { border-radius: 4px; height: 8px; transition: all 0.3s ease; }
        .utilization-low { background: #10B981; }
        .utilization-medium { background: #F59E0B; }
        .utilization-high { background: #EF4444; }

        /* Approval cards */
        .approval-card { transition: all 0.3s ease; animation: slideIn 0.3s ease; }
        .approval-card.removing { animation: slideOut 0.3s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOut { to { opacity: 0; transform: translateX(20px); } }

        /* Tree node styles */
        .tree-node { cursor: pointer; padding: 8px; border-radius: 6px; margin: 4px 0; transition: all 0.2s ease; }
        .tree-node:hover { background: rgba(13, 148, 136, 0.1); }
        .tree-node-expanded .tree-children { max-height: 1000px; overflow: hidden; }
        .tree-node-collapsed .tree-children { max-height: 0; overflow: hidden; }
        .tree-toggle { cursor: pointer; display: inline-block; width: 20px; }

        /* Badge */
        .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 24px; border-radius: 50%; background: #DC2626; color: white; font-size: 12px; font-weight: bold; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal { background: white; border-radius: 12px; padding: 32px; max-width: 500px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }

        /* Waterfall chart */
        .waterfall-item { display: flex; align-items: center; margin: 12px 0; }
        .waterfall-bar { display: flex; flex: 1; height: 32px; border-radius: 6px; overflow: hidden; margin-left: 16px; }
        .waterfall-segment { display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; }

        /* SVG Charts */
        .chart-line { stroke: #0D9488; stroke-width: 2; fill: none; }
        .chart-point { fill: #0D9488; }

        /* MCC Grid */
        .mcc-grid { display: grid; grid-template-columns: auto repeat(6, 1fr); gap: 12px; align-items: center; }
        .mcc-cell { padding: 12px; text-align: center; font-size: 14px; }
        .mcc-allowed { background: rgba(16, 185, 129, 0.1); color: #10B981; }
        .mcc-blocked { background: rgba(239, 68, 68, 0.1); color: #EF4444; }
        .mcc-warning { background: rgba(245, 158, 11, 0.1); color: #F59E0B; }

        /* Page transitions */
        .page-transition { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Responsive sidebar */
        @media (max-width: 768px) {
            .sidebar-text { display: none; }
            .sidebar-icon { width: 100%; text-align: center; }
        }

        /* Pulse animation */

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

                                                <td className="py-3 px-4 text-right font-semibold text-slate-900">₹{(ch.limit/100000).toFixed(1)}L</td>
                                                <td className="py-3 px-4 text-right font-semibold text-slate-900">₹{(ch.utilized/100000).toFixed(1)}L</td>
                                                <td className="py-3 px-4 text-right text-teal-600 font-semibold">₹{((ch.limit - ch.utilized)/100000).toFixed(1)}L</td>
                                            </tr>
                                            {expandedId === ch.id && (
                                                <tr className="bg-gray-50 border-b border-gray-100">
                                                    <td colSpan="6" className="py-4 px-4">
                                                        <div className="grid grid-cols-2 gap-4 text-sm">
                                                            <div>
                                                                <p className="text-xs text-gray-500 uppercase">Last Transaction</p>
                                                                <p className="font-medium text-slate-900">{ch.lastTx}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-xs text-gray-500 uppercase">Utilization Rate</p>
                                                                <p className="font-medium text-slate-900">{((ch.utilized / ch.limit) * 100).toFixed(1)}%</p>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Reports
        const Reports = () => {
            const spendData = departmentData;
            const totalSpend = spendData.reduce((s, d) => s + d.spent, 0);
            const avgPerCardholder = totalSpend / mockCardholders.length;
            const topDept = spendData.reduce((a, b) => a.spent > b.spent ? a : b);
            const monthlyData = [1200000, 1450000, 1680000, 1920000, 2250000, 2850000];

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white rounded-xl p-6 border border-gray-200">
                            <p className="text-gray-600 text-sm font-medium">Total Spend (6m)</p>
                            <p className="text-3xl font-bold text-slate-900 mt-2">₹{(totalSpend/10000000).toFixed(1)}Cr</p>
                        </div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200">
                            <p className="text-gray-600 text-sm font-medium">Avg per Cardholder</p>
                            <p className="text-3xl font-bold text-slate-900 mt-2">₹{(avgPerCardholder/100000).toFixed(1)}L</p>
                        </div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200">
                            <p className="text-gray-600 text-sm font-medium">Top Department</p>
                            <p className="text-2xl font-bold text-slate-900 mt-2">{topDept.name}</p>
                        </div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200">
                            <p className="text-gray-600 text-sm font-medium">MCC Category</p>
                            <p className="text-2xl font-bold text-slate-900 mt-2">SaaS</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold text-slate-900 mb-4">Monthly Spend Trend</h3>
                            <SimpleLineChart data={monthlyData} />
                        </div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold text-slate-900 mb-4">Department Breakdown</h3>
                            <DepartmentChart data={spendData} />
                        </div>
                    </div>

                    <div className="bg-white rounded-xl p-6 border border-gray-200">
                        <button className="px-6 py-2 bg-teal-600 text-white rounded-lg font-medium hover:bg-teal-700">↓ Download Report</button>
                    </div>
                </div>
            );
        };

        // Settings
        const Settings = () => (
            <div className="bg-white rounded-xl p-6 border border-gray-200">
                <h3 className="text-lg font-semibold text-slate-900 mb-4">Settings</h3>
                <div className="space-y-4">
                    <div className="flex justify-between items-center p-4 border border-gray-200 rounded-lg">
                        <div>
                            <p className="font-medium text-slate-900">Approval Notifications</p>
                            <p className="text-sm text-gray-500">Notify on pending approvals</p>
                        </div>
                        <input type="checkbox" defaultChecked className="w-5 h-5 text-teal-600 rounded" />
                    </div>
                    <div className="flex justify-between items-center p-4 border border-gray-200 rounded-lg">
                        <div>
                            <p className="font-medium text-slate-900">Daily Spend Digest</p>
                            <p className="text-sm text-gray-500">Email summary of daily spend</p>
                        </div>
                        <input type="checkbox" defaultChecked className="w-5 h-5 text-teal-600 rounded" />
                    </div>
                    <div className="flex justify-between items-center p-4 border border-gray-200 rounded-lg">
                        <div>
                            <p className="font-medium text-slate-900">Budget Alerts</p>
                            <p className="text-sm text-gray-500">Alert when department exceeds 80%</p>
                        </div>
                        <input type="checkbox" defaultChecked className="w-5 h-5 text-teal-600 rounded" />
                    </div>
                </div>
            </div>
        );

        // Main App
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState('');
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [approvals, setApprovals] = useState(mockApprovals.map(a => ({ ...a, status: null })));

            const pendingCount = approvals.filter(a => !a.status).length;

            const handleLogin = (email, password) => {
                setUser(email.split('@')[0]);
                setIsLoggedIn(true);
            };

            if (!isLoggedIn) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="flex h-screen bg-gray-50">
                    <SidebarNav currentPage={currentPage} setCurrentPage={setCurrentPage} pendingCount={pendingCount} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
                    <div className={`flex-1 flex flex-col transition-all duration-300 ${sidebarOpen ? 'ml-64' : 'ml-20'}`}>
                        <TopHeader user={user} company="Nexo Corp" sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} currentPage={currentPage} />
                        <main className="flex-1 overflow-auto p-6">
                            {currentPage === 'dashboard' && <Dashboard pendingCount={pendingCount} />}
                            {currentPage === 'hierarchy' && <Hierarchy />}
                            {currentPage === 'policies' && <Policies />}
                            {currentPage === 'credit' && <Credit />}
                            {currentPage === 'approvals' && <Approvals approvals={approvals} onApproveReject={setApprovals} />}
                            {currentPage === 'cardholders' && <Cardholders />}
                            {currentPage === 'reports' && <Reports />}
                            {currentPage === 'settings' && <Settings />}
                        </main>
                    </div>
                </div>
            );
        };

        // Render app after loading
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Hide loading screen
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.pointerEvents = 'none';
                loadingScreen.style.transition = 'opacity 0.3s ease';
            }
        }, 500);

        // Initialize Lucide icons after render
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
