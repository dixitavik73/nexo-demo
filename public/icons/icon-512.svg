<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0F172A" rx="120"/>

  <!-- Glow effect -->
  <circle cx="256" cy="256" r="225" fill="none" stroke="#0D9488" stroke-width="2" opacity="0.3" filter="url(#glow)"/>

  <!-- Letter N -->
  <g filter="url(#glow)">
    <text
      x="256"
      y="360"
      font-family="Arial, sans-serif"
      font-size="300"
      font-weight="700"
      fill="url(#tealGradient)"
      text-anchor="middle"
      dominant-baseline="middle"
      letter-spacing="-5"
    >N</text>
  </g>

  <!-- Subtle corner accents -->
  <circle cx="420" cy="90" r="18" fill="#0D9488" opacity="0.6"/>
  <circle cx="92" cy="420" r="18" fill="#0D9488" opacity="0.4"/>
</svg>
