<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Cardholder</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f8fafc;
        }

        #root {
            width: 100%;
            max-width: 390px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        .card-flip {
            perspective: 1000px;
            cursor: pointer;
        }

        .card-flip-inner {
            position: relative;
            width: 100%;
            height: 220px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-flip.flipped .card-flip-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .card-visual {
            background: linear-gradient(135deg, #0F172A 0%, #1e293b 100%);
            border-radius: 16px;
            padding: 24px;
            color: white;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card-visual::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.1) 0%, transparent 70%);
        }

        .card-visual > * {
            position: relative;
            z-index: 1;
        }

        .glowing-text {
            background: linear-gradient(90deg, #0D9488, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tab-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            max-width: 390px;
            margin: 0 auto;
            z-index: 40;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }

        .tab-item.active {
            color: #0D9488;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
            scroll-behavior: smooth;
        }

        .header {
            background: #0F172A;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .header-subtitle {
            font-size: 14px;
            color: #cbd5e1;
            margin: 4px 0 0 0;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in-right {
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .success-checkmark {
            animation: successCheck 0.6s ease-out;
        }

        @keyframes successCheck {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .bounce {
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .scrollable-content {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 8px;
            transition: all 0.3s;
        }

        .otp-input:focus {
            outline: none;
            border-color: #0D9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .otp-input.filled {
            border-color: #0D9488;
            background: #f0fdfa;
        }

        @media (min-width: 768px) {
            #root {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Mock Data
        const MOCK_USER = {

        const MOCK_CARD = {

        const MOCK_TRANSACTIONS = [
            { id: 'TXN001', merchant: 'Swiggy Business', category: 'Food & Dining', mcc: '5812', amount: 2850, date: new Date(2026, 2, 6, 12, 45), status: 'Approved', points: 285, icon: '🍽️' },
            { id: 'TXN002', merchant: 'Uber India', category: 'Travel', mcc: '4121', amount: 1200, date: new Date(2026, 2, 6, 9, 30), status: 'Approved', points: 60, icon: '🚗' },
            { id: 'TXN003', merchant: 'AWS India', category: 'SaaS & Tech', mcc: '7379', amount: 15000, date: new Date(2026, 2, 5, 14, 15), status: 'Approved', points: 750, icon: '☁️' },
            { id: 'TXN004', merchant: 'Flipkart Business', category: 'Office Supplies', mcc: '5411', amount: 3300, date: new Date(2026, 2, 5, 10, 20), status: 'Approved', points: 165, icon: '📦' },
            { id: 'TXN005', merchant: 'MakeMyTrip Corporate', category: 'Travel', mcc: '4511', amount: 18500, date: new Date(2026, 2, 4, 16, 45), status: 'Approved', points: 925, icon: '✈️' },
            { id: 'TXN006', merchant: 'Freshworks', category: 'SaaS & Tech', mcc: '7372', amount: 22000, date: new Date(2026, 2, 3, 11, 0), status: 'Approved', points: 1100, icon: '💼' },
            { id: 'TXN007', merchant: 'Zomato Corporate', category: 'Food & Dining', mcc: '5812', amount: 5350, date: new Date(2026, 2, 3, 12, 30), status: 'Declined', reason: 'Daily Limit Exceeded', points: 0, icon: '🍕' },
            { id: 'TXN008', merchant: 'WeWork India', category: 'Office Supplies', mcc: '6513', amount: 0, date: new Date(2026, 2, 2, 9, 0), status: 'Pending', points: 0, icon: '🏢' },
            { id: 'TXN009', merchant: 'Slack Technologies', category: 'SaaS & Tech', mcc: '7372', amount: 8000, date: new Date(2026, 2, 1, 15, 30), status: 'Approved', points: 400, icon: '💬' },
            { id: 'TXN010', merchant: 'BigBasket', category: 'Office Supplies', mcc: '5411', amount: 1500, date: new Date(2026, 1, 28, 14, 0), status: 'Approved', points: 75, icon: '🛒' },
            { id: 'TXN011', merchant: 'Jio Business', category: 'Utilities', mcc: '4814', amount: 2500, date: new Date(2026, 1, 27, 10, 15), status: 'Approved', points: 125, icon: '📱' },
            { id: 'TXN012', merchant: 'Airtel Business', category: 'Utilities', mcc: '4814', amount: 5000, date: new Date(2026, 1, 26, 11, 45), status: 'Declined', reason: 'MCC Blocked', points: 0, icon: '📡' },
            { id: 'TXN013', merchant: 'Urban Company', category: 'Services', mcc: '7299', amount: 3200, date: new Date(2026, 1, 25, 16, 20), status: 'Approved', points: 160, icon: '🔧' },
            { id: 'TXN014', merchant: 'Zepto Delivery', category: 'Food & Dining', mcc: '5812', amount: 680, date: new Date(2026, 1, 24, 19, 30), status: 'Approved', points: 68, icon: '🚚' },
            { id: 'TXN015', merchant: 'IRCTC', category: 'Travel', mcc: '4511', amount: 4200, date: new Date(2026, 1, 23, 13, 0), status: 'Approved', points: 210, icon: '🚆' },
            { id: 'TXN016', merchant: 'GST Portal Payment', category: 'Utilities', mcc: '9950', amount: 50000, date: new Date(2026, 1, 20, 10, 0), status: 'Approved', points: 0, icon: '📋' }
        ];

        const SPEND_BY_CATEGORY = [
            { name: 'SaaS & Tech', amount: 45000, color: '#0D9488', percentage: 37.5 },
            { name: 'Travel', amount: 22700, color: '#06b6d4', percentage: 18.9 },
            { name: 'Food & Dining', amount: 8200, color: '#f59e0b', percentage: 6.8 },
            { name: 'Office Supplies', amount: 4800, color: '#8b5cf6', percentage: 4.0 },
            { name: 'Utilities', amount: 7500, color: '#6366f1', percentage: 6.2 },
            { name: 'Others', amount: 31800, color: '#94a3b8', percentage: 26.5 }
        ];

        const REDEMPTION_OPTIONS = [
            { id: 'credit', name: 'Statement Credit', description: 'Instant credit to your card', value: '₹3,112', points: 12450 },
            { id: 'amazon', name: 'Amazon Business', description: 'Amazon Business voucher', value: '₹3,100', points: 12400 },
            { id: 'gst', name: 'GST Payment', description: 'GST filing credit', value: '₹3,100', points: 12400 }
        ];

        // Lucide Icons wrapper
        const Icon = ({ name, size = 24, className = '' }) => {
            const iconMap = {
                'home': 'Home',
                'creditcard': 'CreditCard',
                'list': 'List',
                'gift': 'Gift',
                'more': 'MoreHorizontal',
                'lock': 'Lock',
                'unlock': 'Unlock',
                'eye': 'Eye',
                'eyeoff': 'EyeOff',
                'copy': 'Copy',
                'arrow-right': 'ArrowRight',
                'check': 'Check',
                'x': 'X',
                'clock': 'Clock',
                'logout': 'LogOut',
                'bell': 'Bell',
                'help': 'HelpCircle',
                'chevron-right': 'ChevronRight',
                'map-pin': 'MapPin',
                'calendar': 'Calendar',
                'download': 'Download',
                'upload': 'Upload',
                'search': 'Search',
                'filter': 'Filter',
                'freeze': 'Snowflake',
                'zap': 'Zap',
                'target': 'Target',
                'trending-up': 'TrendingUp',
                'star': 'Star',
                'chevron-down': 'ChevronDown'
            };

            const iconName = iconMap[name.toLowerCase()] || name;
            const element = document.createElement('div');
            lucide.createIcons();
            return <svg className={className} width={size} height={size} data-lucide={iconName.toLowerCase().replace(/([A-Z])/g, '-$1').toLowerCase()} />;
        };

        // Login Screen
        const LoginScreen = ({ onLoginSuccess }) => {
            const [phone, setPhone] = useState('');
            const [step, setStep] = useState('phone'); // phone or otp
            const [otp, setOtp] = useState(['', '', '', '']);
            const [error, setError] = useState('');

            const handlePhoneChange = (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 10) value = value.slice(0, 10);
                setPhone(value);
                setError('');
            };

            const handleSendOtp = () => {
                if (phone.length !== 10) {
                    setError('Please enter a valid 10-digit number');
                    return;
                }
                setStep('otp');
                setError('');
            };

            const handleOtpChange = (index, value) => {
                if (!/^\d*$/.test(value)) return;
                const newOtp = [...otp];
                newOtp[index] = value.slice(-1);
                setOtp(newOtp);

                if (value && index < 3) {
                    document.getElementById(`otp-${index + 1}`)?.focus();
                }
            };

            const handleVerifyOtp = () => {
                if (otp.join('').length !== 4) {
                    setError('Please enter a valid 4-digit OTP');
                    return;
                }
                onLoginSuccess();
            };

            return (
                <div className="min-h-screen bg-gradient-to-b from-slate-900 to-slate-800 flex flex-col items-center justify-center p-6" style={{ color: 'white' }}>
                    <div className="text-center mb-12 fade-in">
                        <div className="text-5xl font-bold mb-2 glowing-text">₹</div>
                        <h1 className="text-3xl font-bold mb-2">Nexo</h1>
                        <p className="text-slate-300 text-sm">Corporate Spend, Simplified</p>
                    </div>

                    <div className="w-full max-w-sm bg-slate-800 rounded-2xl p-8 shadow-2xl fade-in">
                        {step === 'phone' ? (
                            <>
                                <h2 className="text-xl font-bold mb-6">Welcome Back</h2>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-slate-300 mb-3">Phone Number</label>
                                    <div className="flex items-center border-2 border-slate-600 rounded-lg px-4 py-3 focus-within:border-teal-500 transition-colors">
                                        <span className="text-slate-300 font-medium mr-2">+91</span>
                                        <input
                                            type="tel"
                                            value={phone}
                                            onChange={handlePhoneChange}
                                            placeholder="98765 43210"
                                            className="flex-1 bg-transparent outline-none text-white placeholder-slate-500"
                                            autoFocus
                                        />
                                    </div>
                                    {error && <p className="text-red-400 text-sm mt-2">{error}</p>}
                                </div>
                                <button
                                    onClick={handleSendOtp}
                                    className="w-full bg-gradient-to-r from-teal-500 to-teal-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition-all"
                                >
                                    Send OTP
                                </button>
                            </>
                        ) : (
                            <>
                                <h2 className="text-xl font-bold mb-2">Verify OTP</h2>
                                <p className="text-slate-400 text-sm mb-6">Enter the 4-digit code sent to +91-{phone}</p>

                                <div className="flex justify-center gap-3 mb-6">
                                    {[0, 1, 2, 3].map((i) => (
                                        <input
                                            key={i}
                                            id={`otp-${i}`}
                                            type="text"
                                            maxLength="1"
                                            value={otp[i]}
                                            onChange={(e) => handleOtpChange(i, e.target.value)}
                                            className="otp-input"
                                        />
                                    ))}
                                </div>

                                {error && <p className="text-red-400 text-sm mb-4 text-center">{error}</p>}

                                <button
                                    onClick={handleVerifyOtp}
                                    className="w-full bg-gradient-to-r from-teal-500 to-teal-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition-all"
                                >
                                    Verify
                                </button>

                                <button
                                    onClick={() => { setStep('phone'); setOtp(['', '', '', '']); }}
                                    className="w-full mt-3 text-teal-400 font-semibold py-3 hover:text-teal-300"
                                >
                                    Change Number
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // Dashboard Screen
        const DashboardScreen = () => {
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
            const [cardFlipped, setCardFlipped] = useState(false);

            const utilization = ((MOCK_CARD.limit - MOCK_CARD.available) / MOCK_CARD.limit) * 100;

            return (
                <div className="content fade-in">
                    <div className="bg-gradient-to-b from-slate-900 to-slate-800 text-white p-6 pb-8">
                        <p className="text-sm text-slate-300 mb-1">Hi {MOCK_USER.name.split(' ')[0]}</p>
                        <p className="text-2xl font-bold">{dateStr}</p>
                    </div>

                    <div className="px-6 -mt-6 relative z-10 mb-6">
                        <div className="card-flip" onClick={() => setCardFlipped(!cardFlipped)}>
                            <div className="card-flip-inner">
                                <div className="card-front">
                                    <div className="card-visual">
                                        <div>
                                            <p className="text-xs text-slate-400 uppercase tracking-wide">Nexo</p>
                                            <p className="text-base font-semibold mt-1">{MOCK_CARD.brand}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-slate-400 uppercase tracking-wide mb-2">Card Number</p>
                                            <p className="text-xl font-mono tracking-widest">•••• •••• •••• {MOCK_CARD.number}</p>
                                        </div>
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-xs text-slate-400 uppercase tracking-wide">Cardholder</p>
                                                <p className="text-sm font-semibold">{MOCK_CARD.holderName}</p>
                                            </div>
                                            <p className="text-sm font-semibold">{MOCK_CARD.expiryMonth}/{MOCK_CARD.expiryYear}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="card-back">
                                    <div className="card-visual">
                                        <div className="w-full h-10 bg-slate-700 mb-4"></div>
                                        <div>
                                            <p className="text-xs text-slate-400 uppercase tracking-wide mb-2">CVV</p>
                                            <p className="text-2xl font-mono tracking-widest">••••</p>
                                            <p className="text-xs text-slate-400 mt-2">Click to reveal</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="px-6 mb-6">
                        <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center mb-3">
                                <p className="text-sm font-medium text-slate-600">Credit Utilization</p>
                                <p className="text-sm font-bold text-slate-900">{utilization.toFixed(1)}%</p>
                            </div>
                            <div className="w-full h-3 bg-slate-200 rounded-full overflow-hidden mb-3">
                                <div
                                    className="h-full bg-gradient-to-r from-teal-500 to-teal-600 transition-all"
                                    style={{ width: `${utilization}%` }}
                                ></div>
                            </div>
                            <div className="flex justify-between text-xs text-slate-600">
                                <span>Available: ₹{MOCK_CARD.available.toLocaleString('en-IN')}</span>
                                <span>Limit: ₹{MOCK_CARD.limit.toLocaleString('en-IN')}</span>
                            </div>
                        </div>
                    </div>

                    <div className="px-6 mb-6">
                        <h3 className="text-sm font-bold text-slate-900 mb-3">Quick Actions</h3>
                        <div className="grid grid-cols-4 gap-3">
                            <button className="flex flex-col items-center p-3 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-teal-300 hover:shadow-md transition-all">
                                <div className="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center mb-2 text-lg">❄️</div>
                                <p className="text-xs font-medium text-center text-slate-700">Freeze</p>
                            </button>
                            <button className="flex flex-col items-center p-3 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-teal-300 hover:shadow-md transition-all">
                                <div className="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mb-2 text-lg">💳</div>
                                <p className="text-xs font-medium text-center text-slate-700">Pay Bill</p>
                            </button>
                            <button className="flex flex-col items-center p-3 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-teal-300 hover:shadow-md transition-all">
                                <div className="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mb-2 text-lg">📄</div>
                                <p className="text-xs font-medium text-center text-slate-700">Invoice</p>
                            </button>
                            <button className="flex flex-col items-center p-3 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-teal-300 hover:shadow-md transition-all">
                                <div className="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center mb-2 text-lg">📃</div>
                                <p className="text-xs font-medium text-center text-slate-700">Statement</p>
                            </button>
                        </div>
                    </div>

                    <div className="px-6 mb-6">
                        <h3 className="text-sm font-bold text-slate-900 mb-3">Spend by Category</h3>
                        <div className="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                            {SPEND_BY_CATEGORY.map((cat, idx) => (
                                <div key={idx} className="mb-4 last:mb-0">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="text-sm font-medium text-slate-700">{cat.name}</p>
                                        <p className="text-sm font-bold text-slate-900">₹{(cat.amount / 1000).toFixed(0)}k</p>
                                    </div>
                                    <div className="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                                        <div
                                            className="h-full transition-all"
                                            style={{ width: `${cat.percentage}%`, background: cat.color }}
                                        ></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="px-6 mb-6">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="text-sm font-bold text-slate-900">Recent Transactions</h3>
                            <a href="#/transactions" className="text-xs font-medium text-teal-600 hover:text-teal-700">View All</a>
                        </div>
                        <div className="space-y-3">
                            {MOCK_TRANSACTIONS.slice(0, 5).map((txn) => (
                                <div key={txn.id} className="flex items-center gap-3 bg-white p-4 rounded-lg shadow-sm border border-slate-200">

                                <span className="text-slate-400">→</span>
                            </button>
                            <button className="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-50 transition-colors">
                                <span className="text-sm font-medium text-slate-900">❓ Help & Support</span>
                                <span className="text-slate-400">→</span>
                            </button>
                        </div>
                    </div>

                    <div className="px-6 mb-6">
                        <button
                            onClick={onLogout}
                            className="w-full flex items-center justify-center gap-2 py-3 bg-red-50 text-red-700 border border-red-200 rounded-lg font-semibold hover:bg-red-100 transition-all"
                        >
                            <span>🚪</span>
                            Logout
                        </button>
                    </div>
                </div>
            );
        };

        // Bottom Navigation
        const BottomNav = ({ currentTab, onTabChange }) => {
            const tabs = [
                { id: 'dashboard', name: 'Dashboard', icon: '🏠' },
                { id: 'card', name: 'Card', icon: '💳' },
                { id: 'transactions', name: 'Transactions', icon: '📊' },
                { id: 'rewards', name: 'Rewards', icon: '🎁' },
                { id: 'more', name: 'More', icon: '⋯' }
            ];

            return (
                <div className="tab-nav">
                    {tabs.map((tab) => (
                        <button
                            key={tab.id}
                            onClick={() => onTabChange(tab.id)}
                            className={`tab-item ${currentTab === tab.id ? 'active' : ''}`}
                        >
                            <span className="text-xl">{tab.icon}</span>
                            <span>{tab.name}</span>
                        </button>
                    ))}
                </div>
            );
        };

        // Main App Component
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentTab, setCurrentTab] = useState('dashboard');

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentTab('dashboard');
            };

            if (!isLoggedIn) {
                return <LoginScreen onLoginSuccess={() => setIsLoggedIn(true)} />;
            }

            return (
                <div className="relative">
                    {currentTab === 'dashboard' && <DashboardScreen />}
                    {currentTab === 'card' && <CardScreen />}
                    {currentTab === 'transactions' && <TransactionsScreen />}
                    {currentTab === 'rewards' && <RewardsScreen />}
                    {currentTab === 'invoice' && <InvoiceScreen />}
                    {currentTab === 'more' && <MoreScreen onLogout={handleLogout} />}

                    <BottomNav currentTab={currentTab} onTabChange={setCurrentTab} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
